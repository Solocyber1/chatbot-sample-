<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TechNova Solutions — AI Assistant</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Space+Grotesk:wght@500;700&display=swap');

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #0a0e1a;
    --surface: #111827;
    --surface2: #1a2235;
    --border: #1f2d45;
    --accent: #00c2ff;
    --accent2: #7c3aed;
    --text: #e2e8f0;
    --muted: #64748b;
    --user-bubble: #1e3a5f;
    --bot-bubble: #1a2235;
    --success: #10b981;
  }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Inter', sans-serif;
    height: 100dvh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 16px;
  }

  .chat-wrapper {
    width: 100%;
    max-width: 720px;
    height: min(760px, 92dvh);
    display: flex;
    flex-direction: column;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 20px;
    overflow: hidden;
    box-shadow: 0 0 60px rgba(0,194,255,0.06), 0 32px 64px rgba(0,0,0,0.5);
  }

  /* Header */
  .header {
    padding: 18px 24px;
    background: var(--surface2);
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    gap: 14px;
    flex-shrink: 0;
  }

  .logo {
    width: 42px;
    height: 42px;
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    border-radius: 12px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: 'Space Grotesk', sans-serif;
    font-weight: 700;
    font-size: 16px;
    color: #fff;
    flex-shrink: 0;
  }

  .header-text h1 {
    font-family: 'Space Grotesk', sans-serif;
    font-size: 16px;
    font-weight: 700;
    color: var(--text);
    line-height: 1;
  }

  .header-text p {
    font-size: 12px;
    color: var(--muted);
    margin-top: 3px;
  }

  .status {
    margin-left: auto;
    display: flex;
    align-items: center;
    gap: 6px;
    font-size: 12px;
    color: var(--success);
  }

  .status-dot {
    width: 7px;
    height: 7px;
    background: var(--success);
    border-radius: 50%;
    animation: pulse 2s infinite;
  }

  @keyframes pulse {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.4; }
  }

  /* Messages */
  .messages {
    flex: 1;
    overflow-y: auto;
    padding: 24px 20px;
    display: flex;
    flex-direction: column;
    gap: 16px;
    scrollbar-width: thin;
    scrollbar-color: var(--border) transparent;
  }

  .messages::-webkit-scrollbar { width: 4px; }
  .messages::-webkit-scrollbar-track { background: transparent; }
  .messages::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }

  .msg {
    display: flex;
    gap: 10px;
    max-width: 88%;
    animation: fadeIn 0.2s ease;
  }

  @keyframes fadeIn {
    from { opacity: 0; transform: translateY(8px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .msg.user { align-self: flex-end; flex-direction: row-reverse; }
  .msg.bot { align-self: flex-start; }

  .avatar {
    width: 32px;
    height: 32px;
    border-radius: 10px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 14px;
    flex-shrink: 0;
    margin-top: 2px;
  }

  .msg.bot .avatar {
    background: linear-gradient(135deg, var(--accent), var(--accent2));
  }

  .msg.user .avatar {
    background: var(--user-bubble);
    font-size: 13px;
  }

  .bubble {
    padding: 12px 16px;
    border-radius: 16px;
    font-size: 14px;
    line-height: 1.6;
    max-width: 100%;
    word-break: break-word;
  }

  .msg.bot .bubble {
    background: var(--bot-bubble);
    border: 1px solid var(--border);
    border-top-left-radius: 4px;
    color: var(--text);
  }

  .msg.user .bubble {
    background: linear-gradient(135deg, #0e4f8a, #1a3a6b);
    border-top-right-radius: 4px;
    color: #e2e8f0;
  }

  /* Typing indicator */
  .typing .bubble {
    padding: 14px 18px;
  }

  .typing-dots {
    display: flex;
    gap: 5px;
    align-items: center;
  }

  .typing-dots span {
    width: 7px;
    height: 7px;
    background: var(--muted);
    border-radius: 50%;
    animation: bounce 1.2s infinite;
  }

  .typing-dots span:nth-child(2) { animation-delay: 0.2s; }
  .typing-dots span:nth-child(3) { animation-delay: 0.4s; }

  @keyframes bounce {
    0%, 80%, 100% { transform: translateY(0); }
    40% { transform: translateY(-6px); }
  }

  /* Input area */
  .input-area {
    padding: 16px 20px;
    background: var(--surface2);
    border-top: 1px solid var(--border);
    display: flex;
    gap: 10px;
    align-items: flex-end;
    flex-shrink: 0;
  }

  textarea {
    flex: 1;
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 12px;
    color: var(--text);
    font-family: 'Inter', sans-serif;
    font-size: 14px;
    padding: 12px 16px;
    resize: none;
    outline: none;
    min-height: 46px;
    max-height: 120px;
    line-height: 1.5;
    transition: border-color 0.2s;
  }

  textarea:focus { border-color: var(--accent); }
  textarea::placeholder { color: var(--muted); }

  .send-btn {
    width: 46px;
    height: 46px;
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    border: none;
    border-radius: 12px;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: opacity 0.2s, transform 0.1s;
    flex-shrink: 0;
  }

  .send-btn:hover { opacity: 0.88; }
  .send-btn:active { transform: scale(0.95); }
  .send-btn:disabled { opacity: 0.4; cursor: not-allowed; }

  .send-btn svg { width: 18px; height: 18px; fill: white; }

  /* Footer */
  .footer {
    text-align: center;
    padding: 8px 20px 14px;
    font-size: 11px;
    color: var(--muted);
    background: var(--surface2);
    flex-shrink: 0;
  }

  .footer a { color: var(--accent); text-decoration: none; }

  /* Error toast */
  .toast {
    position: fixed;
    bottom: 24px;
    left: 50%;
    transform: translateX(-50%);
    background: #7f1d1d;
    color: #fecaca;
    padding: 10px 20px;
    border-radius: 10px;
    font-size: 13px;
    display: none;
    z-index: 99;
  }

  .toast.show { display: block; animation: fadeIn 0.3s ease; }
</style>
</head>
<body>

<div class="chat-wrapper">
  <div class="header">
    <div class="logo">TN</div>
    <div class="header-text">
      <h1>TechNova Assistant</h1>
      <p>Nova — AI powered by TechNova Solutions</p>
    </div>
    <div class="status">
      <div class="status-dot"></div>
      Online
    </div>
  </div>

  <div class="messages" id="messages"></div>

  <div class="input-area">
    <textarea id="input" placeholder="Ask about our services, pricing, or get in touch..." rows="1"></textarea>
    <button class="send-btn" id="sendBtn" onclick="sendMessage()">
      <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
        <path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"/>
      </svg>
    </button>
  </div>

  <div class="footer">
    Powered by <a href="https://www.technovasolutions.pk" target="_blank">TechNova Solutions</a> &nbsp;·&nbsp; hello@technovasolutions.pk
  </div>
</div>

<div class="toast" id="toast">Connection error. Please try again.</div>

<script>
  const WEBHOOK_URL = 'https://shadow2127.app.n8n.cloud/webhook/technova-chat';
  const sessionId = 'session-' + Math.random().toString(36).substr(2, 9);

  const messagesEl = document.getElementById('messages');
  const inputEl = document.getElementById('input');
  const sendBtn = document.getElementById('sendBtn');

  // Auto-resize textarea
  inputEl.addEventListener('input', () => {
    inputEl.style.height = 'auto';
    inputEl.style.height = Math.min(inputEl.scrollHeight, 120) + 'px';
  });

  // Enter to send (Shift+Enter for newline)
  inputEl.addEventListener('keydown', (e) => {
    if (e.key === 'Enter' && !e.shiftKey) {
      e.preventDefault();
      sendMessage();
    }
  });

  function addMessage(text, role) {
    const msg = document.createElement('div');
    msg.className = `msg ${role}`;

    const avatar = document.createElement('div');
    avatar.className = 'avatar';
    avatar.textContent = role === 'bot' ? '✦' : '👤';

    const bubble = document.createElement('div');
    bubble.className = 'bubble';
    bubble.textContent = text;

    msg.appendChild(avatar);
    msg.appendChild(bubble);
    messagesEl.appendChild(msg);
    messagesEl.scrollTop = messagesEl.scrollHeight;
    return msg;
  }

  function showTyping() {
    const msg = document.createElement('div');
    msg.className = 'msg bot typing';
    msg.id = 'typing';

    const avatar = document.createElement('div');
    avatar.className = 'avatar';
    avatar.textContent = '✦';

    const bubble = document.createElement('div');
    bubble.className = 'bubble';
    bubble.innerHTML = '<div class="typing-dots"><span></span><span></span><span></span></div>';

    msg.appendChild(avatar);
    msg.appendChild(bubble);
    messagesEl.appendChild(msg);
    messagesEl.scrollTop = messagesEl.scrollHeight;
  }

  function removeTyping() {
    const t = document.getElementById('typing');
    if (t) t.remove();
  }

  function showToast(msg) {
    const t = document.getElementById('toast');
    t.textContent = msg || 'Something went wrong. Please try again.';
    t.classList.add('show');
    setTimeout(() => t.classList.remove('show'), 3500);
  }

  async function sendMessage() {
    const text = inputEl.value.trim();
    if (!text) return;

    addMessage(text, 'user');
    inputEl.value = '';
    inputEl.style.height = 'auto';
    sendBtn.disabled = true;
    showTyping();

    try {
      const res = await fetch(WEBHOOK_URL, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ message: text, sessionId })
      });

      removeTyping();

      if (!res.ok) throw new Error('HTTP ' + res.status);

      const data = await res.json();
      const reply = data.reply || 'Sorry, I could not process that. Please try again.';
      addMessage(reply, 'bot');

    } catch (err) {
      removeTyping();
      showToast('Could not reach Nova. Check your connection.');
    } finally {
      sendBtn.disabled = false;
      inputEl.focus();
    }
  }

  // Welcome message on load
  window.onload = () => {
    setTimeout(() => {
      addMessage("👋 Hi! I'm Nova, TechNova Solutions' AI assistant. I can tell you about our services, answer your questions, or connect you with our team. How can I help you today?", 'bot');
    }, 400);
    inputEl.focus();
  };
</script>
</body>
</html>
